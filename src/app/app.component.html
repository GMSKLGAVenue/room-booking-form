<div class="container">
  <h1>{{ title }}</h1>

  <form [formGroup]="bookingForm" class="form-grid">
    <my-input
      formControlName="name"
      [label]="t('app.form.fields.name.label')"
      [placeholder]="t('app.form.fields.name.placeholder')"
    ></my-input>

    <my-input
      formControlName="whatsapp"
      [label]="t('app.form.fields.whatsapp.label')"
      [placeholder]="t('app.form.fields.whatsapp.placeholder')"
    ></my-input>

    <my-input
      formControlName="email"
      [label]="t('app.form.fields.email.label')"
      [placeholder]="t('app.form.fields.email.placeholder')"
      type="email"
    ></my-input>

    <my-input
      formControlName="eventName"
      [label]="t('app.form.fields.eventName.label')"
      [placeholder]="t('app.form.fields.eventName.placeholder')"
    ></my-input>

    <my-datetime-range
      formControlName="dateRange"
      [label]="t('app.form.fields.dateRange.label')"
      [placeholder]="t('app.form.fields.dateRange.placeholder')"
    ></my-datetime-range>

    
    <div class="field">
      <label>{{ t('app.form.groups.equipment.label') }}</label>
      <div class="checkbox-group">
        @for (option of equipmentOptions; track option.value) {
          <my-checkbox formControlName="equipment" [value]="option.value" [label]="option.label"></my-checkbox>
        }
      </div>
    </div>

    <div class="field">
      <label>{{ t('app.form.groups.keySource.label') }}</label>
      <div class="radio-group">
        @for (option of keySourceOptions; track option.value) {
          <my-radio formControlName="keySource" name="keySource" [value]="option.value" [label]="option.label"></my-radio>
        }
      </div>
    </div>
  </form>
</div>
